name: Zampto-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1,13 * * *'   # 每天 UTC 时间 01:00 和 13:00 (即北京时间 09:00 和 21:00) 各执行一次

jobs:
  run_zampto_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 下载公库代码
        uses: actions/checkout@v4

      - name: 📥 下载私库脚本
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/Zampto-Renew-Private
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 📂 移动脚本
        run: mv private/zampto_renew.py zampto_renew.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 安装依赖 (包含 xvfb)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable xvfb x11-utils xdotool
          pip install seleniumbase requests
          seleniumbase install chromedriver

      - name: 🚀 运行续期脚本
        env:
          PYTHONIOENCODING: utf-8
          ZAMPTO_ACCOUNT: ${{ secrets.ZAMPTO_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python zampto_renew.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
